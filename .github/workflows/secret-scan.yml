name: Secret Scan

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: 8.30.1
          GITLEAKS_SHA256: 551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o gitleaks.tar.gz
          echo "${GITLEAKS_SHA256}  gitleaks.tar.gz" | sha256sum --check --
          tar -xzf gitleaks.tar.gz gitleaks
          mkdir -p "$HOME/.local/bin"
          install -m 0755 gitleaks "$HOME/.local/bin/gitleaks"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          rm -f gitleaks gitleaks.tar.gz

      - name: Select scan scope
        id: scope
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          zero="$(printf '0%.0s' {1..40})"

          if [ "$EVENT_NAME" = "pull_request" ]; then
            echo "log_opts=${PR_BASE_SHA}..${PR_HEAD_SHA}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -n "$BEFORE_SHA" ] && [ "$BEFORE_SHA" != "$zero" ]; then
            echo "log_opts=${BEFORE_SHA}..${HEAD_SHA}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "log_opts=" >> "$GITHUB_OUTPUT"

      - name: Scan git history
        env:
          LOG_OPTS: ${{ steps.scope.outputs.log_opts }}
        run: |
          if [ -n "$LOG_OPTS" ]; then
            gitleaks git --no-banner --redact --log-opts="$LOG_OPTS" .
            exit 0
          fi

          gitleaks git --no-banner --redact .
