<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">CodexPocket architecture overview</title>
  <desc id="desc">A diagram showing the iPhone sending requests through Bridge to Codex on the Mac, which works with workspace, Git, and thread state.</desc>
  <defs>
    <linearGradient id="surface" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#FFF9F2"/>
      <stop offset="100%" stop-color="#FCEFE1"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#FFAA5B"/>
      <stop offset="100%" stop-color="#E45D28"/>
    </linearGradient>
    <linearGradient id="darkCard" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#2A1B12"/>
      <stop offset="100%" stop-color="#140D08"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#5A321C" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 1 1 L 11 6 L 1 11 z" fill="#D45A28"/>
    </marker>
  </defs>

  <rect width="1200" height="760" rx="36" fill="#F8EFE2"/>
  <circle cx="1045" cy="130" r="185" fill="#FFDCC4" opacity="0.72"/>
  <circle cx="120" cy="648" r="196" fill="#FFE8D6" opacity="0.88"/>
  <circle cx="918" cy="658" r="144" fill="#FFF3E6" opacity="0.88"/>

  <g filter="url(#shadow)">
    <rect x="74" y="148" width="264" height="474" rx="38" fill="url(#surface)" stroke="#E8C9AE"/>
    <rect x="104" y="178" width="204" height="414" rx="30" fill="url(#darkCard)"/>
    <rect x="170" y="188" width="72" height="8" rx="4" fill="#453126"/>
    <text x="206" y="226" fill="#FFF1E5" font-family="Space Grotesk, Arial, sans-serif" font-size="28" font-weight="700" text-anchor="middle">iPhone</text>

    <rect x="130" y="264" width="152" height="62" rx="22" fill="#FFF4EA"/>
    <text x="206" y="302" fill="#291810" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" text-anchor="middle">Project</text>

    <rect x="130" y="344" width="152" height="62" rx="22" fill="#FFF4EA"/>
    <text x="206" y="382" fill="#291810" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" text-anchor="middle">Thread</text>

    <rect x="130" y="424" width="152" height="92" rx="26" fill="url(#orange)"/>
    <text x="206" y="465" fill="#FFF7F1" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" text-anchor="middle">Composer</text>
    <text x="206" y="492" fill="#FFE8DB" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" text-anchor="middle">send requests</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="458" y="296" width="150" height="116" rx="34" fill="url(#orange)"/>
    <circle cx="532" cy="342" r="18" fill="#FFF5EE"/>
    <path d="M520 342 H544" stroke="#D45A28" stroke-width="5" stroke-linecap="round"/>
    <path d="M532 330 V354" stroke="#D45A28" stroke-width="5" stroke-linecap="round"/>
    <text x="533" y="381" fill="#FFF9F4" font-family="Space Grotesk, Arial, sans-serif" font-size="30" font-weight="700" text-anchor="middle">Bridge</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="654" y="96" width="468" height="554" rx="38" fill="url(#surface)" stroke="#E8C9AE"/>
    <text x="696" y="138" fill="#8A5A40" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Mac side</text>

    <rect x="690" y="166" width="396" height="84" rx="28" fill="#FFF5EC" stroke="#E8D3C0"/>
    <text x="888" y="209" fill="#24160E" font-family="Space Grotesk, Arial, sans-serif" font-size="30" font-weight="700" text-anchor="middle">CodexPocketMac</text>
    <text x="888" y="232" fill="#7B5740" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="600" text-anchor="middle">pairing, projects, logs, bridge state</text>

    <rect x="690" y="274" width="396" height="176" rx="32" fill="url(#darkCard)"/>
    <text x="888" y="340" fill="#FFF3E8" font-family="Space Grotesk, Arial, sans-serif" font-size="40" font-weight="700" text-anchor="middle">Codex on Mac</text>
    <text x="888" y="374" fill="#E5CDBD" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="600" text-anchor="middle">runs commands, agents, and file changes</text>
    <rect x="792" y="395" width="192" height="28" rx="14" fill="#2F221A" stroke="#5E4332"/>
    <circle cx="816" cy="409" r="6" fill="#FFAA5B"/>
    <circle cx="838" cy="409" r="6" fill="#FFD57C"/>
    <circle cx="860" cy="409" r="6" fill="#67C085"/>

    <rect x="690" y="476" width="188" height="124" rx="28" fill="#FFF5EC" stroke="#E8D3C0"/>
    <text x="784" y="528" fill="#24160E" font-family="Space Grotesk, Arial, sans-serif" font-size="26" font-weight="700" text-anchor="middle">Workspace</text>
    <text x="784" y="555" fill="#7B5740" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" text-anchor="middle">files and folders</text>
    <path d="M736 542 h34 l10 -12 h46 a12 12 0 0 1 12 12 v22 a12 12 0 0 1 -12 12 h-90 a12 12 0 0 1 -12 -12 v-10 a12 12 0 0 1 12 -12 z" fill="#FFD8BF" stroke="#E45D28"/>

    <rect x="898" y="476" width="188" height="124" rx="28" fill="#FFF5EC" stroke="#E8D3C0"/>
    <text x="992" y="524" fill="#24160E" font-family="Space Grotesk, Arial, sans-serif" font-size="26" font-weight="700" text-anchor="middle">Git / Threads</text>
    <text x="992" y="551" fill="#7B5740" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" text-anchor="middle">history and state</text>
    <path d="M953 565 a14 14 0 1 1 0 -28 a14 14 0 0 1 0 28 z" fill="#FFD8BF" stroke="#E45D28"/>
    <path d="M992 540 h45 a12 12 0 0 1 12 12 v17 a12 12 0 0 1 -12 12 h-70 a12 12 0 0 1 -12 -12 v-5" fill="none" stroke="#E45D28" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <path d="M338 356 C 388 356, 416 356, 458 356" fill="none" stroke="#D45A28" stroke-width="8" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M608 356 C 628 356, 636 356, 654 356" fill="none" stroke="#D45A28" stroke-width="8" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M908 146 C 760 54, 482 56, 260 146" fill="none" stroke="#E18A63" stroke-width="5" stroke-dasharray="10 12" stroke-linecap="round" marker-end="url(#arrow)"/>

  <text x="396" y="337" fill="#8A5A40" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">request stream</text>
  <text x="738" y="64" fill="#8A5A40" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">status, logs, answers</text>
</svg>
