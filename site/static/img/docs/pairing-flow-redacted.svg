  <rect x="874" y="354" width="204" height="36" rx="18" fill="url(#arrowGlow)"/>
  <path d="M880 372H1034" stroke="#F6B14A" stroke-width="12" stroke-linecap="round"/>
  <path d="M1018 332L1072 372L1018 412" stroke="#F6B14A" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="972" y="448" text-anchor="middle" fill="#E8D7B7" font-family="SF Pro Display, Helvetica, Arial, sans-serif" font-size="24" font-weight="600">scan and continue</text>
