<svg width="1600" height="1160" viewBox="0 0 1600 1160" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">CodexPocket pairing flow redacted</title>
  <desc id="desc">A redacted illustration of the Mac pairing screen and the iPhone QR add screen shown side by side.</desc>
  <defs>
    <linearGradient id="bg" x1="128" y1="96" x2="1472" y2="884" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F1115"/>
      <stop offset="1" stop-color="#181B22"/>
    </linearGradient>
    <linearGradient id="macPanel" x1="60" y1="90" x2="800" y2="910" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1C1C1F"/>
      <stop offset="1" stop-color="#232327"/>
    </linearGradient>
    <linearGradient id="phoneShell" x1="1110" y1="60" x2="1530" y2="920" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0C0D11"/>
      <stop offset="1" stop-color="#191A1F"/>
    </linearGradient>
    <linearGradient id="sheet" x1="1134" y1="168" x2="1518" y2="874" gradientUnits="userSpaceOnUse">
      <stop stop-color="#232326"/>
      <stop offset="1" stop-color="#1F1F22"/>
    </linearGradient>
    <linearGradient id="camera" x1="1178" y1="470" x2="1466" y2="710" gradientUnits="userSpaceOnUse">
      <stop stop-color="#B1A094"/>
      <stop offset="0.55" stop-color="#C3B0A1"/>
      <stop offset="1" stop-color="#8E7E74"/>
    </linearGradient>
    <linearGradient id="arrowGlow" x1="872" y1="372" x2="1080" y2="372" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F6B14A" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#F6B14A"/>
      <stop offset="1" stop-color="#F6B14A" stop-opacity="0"/>
    </linearGradient>
    <pattern id="qrPattern" width="42" height="42" patternUnits="userSpaceOnUse">
      <rect width="42" height="42" fill="#FCFCFC"/>
      <rect x="2" y="2" width="12" height="12" fill="#151515"/>
      <rect x="18" y="2" width="6" height="6" fill="#151515"/>
      <rect x="28" y="2" width="10" height="10" fill="#151515"/>
      <rect x="4" y="18" width="8" height="8" fill="#151515"/>
      <rect x="14" y="12" width="6" height="6" fill="#151515"/>
      <rect x="22" y="16" width="8" height="8" fill="#151515"/>
      <rect x="32" y="18" width="6" height="6" fill="#151515"/>
      <rect x="10" y="28" width="10" height="10" fill="#151515"/>
      <rect x="24" y="28" width="6" height="6" fill="#151515"/>
      <rect x="32" y="30" width="8" height="8" fill="#151515"/>
    </pattern>
    <filter id="shadow" x="0" y="0" width="1600" height="1160" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="32" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <filter id="softBlur" x="0" y="0" width="1600" height="1160" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="0.9"/>
    </filter>
