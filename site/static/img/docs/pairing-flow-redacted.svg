    <rect x="104" y="890" width="214" height="28" rx="14" fill="#7F7F89" opacity="0.68"/>
    <rect x="104" y="946" width="142" height="18" rx="9" fill="#F3F0E9"/>
    <rect x="104" y="978" width="472" height="40" rx="20" fill="#3A3B40"/>
    <rect x="126" y="989" width="250" height="18" rx="9" fill="#A2A3AA" opacity="0.68"/>
