      <path d="M1206 748C1244 720 1280 728 1314 706C1362 676 1414 700 1444 742C1468 776 1456 820 1410 836C1356 854 1294 850 1246 830C1208 814 1168 776 1206 748Z" fill="#6E615A"/>
