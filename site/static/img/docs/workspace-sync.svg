<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">Workspace sync overview</title>
  <desc id="desc">A diagram showing workspaces from the Mac Codex App flowing into CodexPocketMac project candidates and then appearing in the iPhone project list.</desc>
  <defs>
    <linearGradient id="surface" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#FFF9F2"/>
      <stop offset="100%" stop-color="#FCEEE0"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#FFB15B"/>
      <stop offset="100%" stop-color="#E45D28"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#5A321C" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 1 1 L 11 6 L 1 11 z" fill="#D45A28"/>
    </marker>
  </defs>

  <rect width="1200" height="680" rx="36" fill="#F8EFE2"/>
  <circle cx="182" cy="130" r="170" fill="#FFE3CF" opacity="0.72"/>
  <circle cx="1060" cy="594" r="190" fill="#FFF2E4" opacity="0.88"/>

  <text x="80" y="98" fill="#8A5A40" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Workspace visibility from Mac to iPhone</text>

  <g filter="url(#shadow)">
    <rect x="78" y="152" width="286" height="404" rx="34" fill="url(#surface)" stroke="#E7C6AA"/>
    <text x="221" y="210" fill="#28170E" font-family="Space Grotesk, Arial, sans-serif" font-size="34" font-weight="700" text-anchor="middle">Codex App</text>
    <text x="221" y="244" fill="#7B5740" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="600" text-anchor="middle">Mac workspace list</text>

    <path d="M122 300 h56 l14 -16 h92 a14 14 0 0 1 14 14 v34 a14 14 0 0 1 -14 14 h-148 a14 14 0 0 1 -14 -14 v-18 a14 14 0 0 1 14 -14 z" fill="#FFD8BF" stroke="#E45D28" stroke-width="2"/>
    <text x="210" y="327" fill="#331D12" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" text-anchor="middle">workspace-a</text>

    <path d="M122 374 h56 l14 -16 h92 a14 14 0 0 1 14 14 v34 a14 14 0 0 1 -14 14 h-148 a14 14 0 0 1 -14 -14 v-18 a14 14 0 0 1 14 -14 z" fill="#FFE7D7" stroke="#D99672" stroke-width="2"/>
    <text x="210" y="401" fill="#331D12" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" text-anchor="middle">workspace-b</text>

    <path d="M122 448 h56 l14 -16 h92 a14 14 0 0 1 14 14 v34 a14 14 0 0 1 -14 14 h-148 a14 14 0 0 1 -14 -14 v-18 a14 14 0 0 1 14 -14 z" fill="#FFF0E5" stroke="#D4A88A" stroke-width="2"/>
    <text x="210" y="475" fill="#331D12" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" text-anchor="middle">workspace-c</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="452" y="136" width="344" height="436" rx="34" fill="url(#surface)" stroke="#E7C6AA"/>
    <rect x="486" y="174" width="276" height="72" rx="24" fill="url(#orange)"/>
    <text x="624" y="218" fill="#FFF8F3" font-family="Space Grotesk, Arial, sans-serif" font-size="30" font-weight="700" text-anchor="middle">CodexPocketMac</text>

    <text x="624" y="292" fill="#28170E" font-family="Space Grotesk, Arial, sans-serif" font-size="28" font-weight="700" text-anchor="middle">Projects</text>

    <rect x="506" y="324" width="236" height="54" rx="18" fill="#FFF5EC" stroke="#E7C6AA"/>
    <text x="624" y="358" fill="#28170E" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" text-anchor="middle">workspace-a</text>

    <rect x="506" y="394" width="236" height="54" rx="18" fill="#FFF5EC" stroke="#E7C6AA"/>
    <text x="624" y="428" fill="#28170E" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" text-anchor="middle">workspace-b</text>

    <rect x="506" y="464" width="236" height="54" rx="18" fill="#FFF5EC" stroke="#E7C6AA"/>
    <text x="624" y="498" fill="#28170E" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" text-anchor="middle">workspace-c</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="888" y="156" width="230" height="396" rx="36" fill="url(#surface)" stroke="#E7C6AA"/>
    <rect x="918" y="186" width="170" height="336" rx="28" fill="#1C130F"/>
    <rect x="970" y="196" width="66" height="8" rx="4" fill="#453126"/>
    <text x="1003" y="236" fill="#FFF1E5" font-family="Space Grotesk, Arial, sans-serif" font-size="26" font-weight="700" text-anchor="middle">iPhone</text>
    <text x="1003" y="264" fill="#D8B8A4" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="600" text-anchor="middle">Projects</text>

    <rect x="942" y="306" width="122" height="42" rx="16" fill="#FFF4EA"/>
    <text x="1003" y="334" fill="#291810" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700" text-anchor="middle">workspace-a</text>

    <rect x="942" y="364" width="122" height="42" rx="16" fill="#FFF4EA"/>
    <text x="1003" y="392" fill="#291810" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700" text-anchor="middle">workspace-b</text>

    <rect x="942" y="422" width="122" height="42" rx="16" fill="#FFF4EA"/>
    <text x="1003" y="450" fill="#291810" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700" text-anchor="middle">workspace-c</text>
  </g>

  <path d="M364 354 H452" fill="none" stroke="#D45A28" stroke-width="8" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M796 354 H888" fill="none" stroke="#D45A28" stroke-width="8" stroke-linecap="round" marker-end="url(#arrow)"/>
  <text x="408" y="334" fill="#8A5A40" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">auto import</text>
  <text x="837" y="334" fill="#8A5A40" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">pull to refresh</text>
</svg>
